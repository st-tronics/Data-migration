# ============================================================================
# Kubernetes Deployment Configuration
# Data Migration Planning and Delivery Tool
# ============================================================================

---
# Namespace
apiVersion: v1
kind: Namespace
metadata:
  name: migration-tool
  labels:
    name: migration-tool
    environment: production

---
# ConfigMap for Application Configuration
apiVersion: v1
kind: ConfigMap
metadata:
  name: migration-tool-config
  namespace: migration-tool
data:
  NODE_ENV: "production"
  LOG_LEVEL: "info"
  API_PORT: "3000"
  POSTGRES_HOST: "postgres-service"
  POSTGRES_PORT: "5432"
  POSTGRES_DB: "migration_tool"
  MONGODB_HOST: "mongodb-service"
  MONGODB_PORT: "27017"
  MONGODB_DB: "migration_rules"
  REDIS_HOST: "redis-service"
  REDIS_PORT: "6379"
  KAFKA_BROKERS: "kafka-service:9092"

---
# Secret for Sensitive Data
apiVersion: v1
kind: Secret
metadata:
  name: migration-tool-secrets
  namespace: migration-tool
type: Opaque
stringData:
  POSTGRES_USER: "migration_admin"
  POSTGRES_PASSWORD: "CHANGE_ME_IN_PRODUCTION"
  MONGODB_USER: "migration_admin"
  MONGODB_PASSWORD: "CHANGE_ME_IN_PRODUCTION"
  JWT_SECRET: "CHANGE_ME_IN_PRODUCTION"
  ENCRYPTION_KEY: "CHANGE_ME_IN_PRODUCTION"

---
# PostgreSQL StatefulSet
apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: postgres
  namespace: migration-tool
spec:
  serviceName: postgres-service
  replicas: 1
  selector:
    matchLabels:
      app: postgres
  template:
    metadata:
      labels:
        app: postgres
    spec:
      containers:
      - name: postgres
        image: postgres:15-alpine
        ports:
        - containerPort: 5432
          name: postgres
        env:
        - name: POSTGRES_DB
          valueFrom:
            configMapKeyRef:
              name: migration-tool-config
              key: POSTGRES_DB
        - name: POSTGRES_USER
          valueFrom:
            secretKeyRef:
              name: migration-tool-secrets
              key: POSTGRES_USER
        - name: POSTGRES_PASSWORD
          valueFrom:
            secretKeyRef:
              name: migration-tool-secrets
              key: POSTGRES_PASSWORD
        volumeMounts:
        - name: postgres-storage
          mountPath: /var/lib/postgresql/data
        resources:
          requests:
            memory: "2Gi"
            cpu: "1000m"
          limits:
            memory: "4Gi"
            cpu: "2000m"
  volumeClaimTemplates:
  - metadata:
      name: postgres-storage
    spec:
      accessModes: ["ReadWriteOnce"]
      resources:
        requests:
          storage: 50Gi

---
# PostgreSQL Service
apiVersion: v1
kind: Service
metadata:
  name: postgres-service
  namespace: migration-tool
spec:
  selector:
    app: postgres
  ports:
  - port: 5432
    targetPort: 5432
  clusterIP: None

---
# MongoDB StatefulSet
apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: mongodb
  namespace: migration-tool
spec:
  serviceName: mongodb-service
  replicas: 1
  selector:
    matchLabels:
      app: mongodb
  template:
    metadata:
      labels:
        app: mongodb
    spec:
      containers:
      - name: mongodb
        image: mongo:7
        ports:
        - containerPort: 27017
          name: mongodb
        env:
        - name: MONGO_INITDB_DATABASE
          valueFrom:
            configMapKeyRef:
              name: migration-tool-config
              key: MONGODB_DB
        - name: MONGO_INITDB_ROOT_USERNAME
          valueFrom:
            secretKeyRef:
              name: migration-tool-secrets
              key: MONGODB_USER
        - name: MONGO_INITDB_ROOT_PASSWORD
          valueFrom:
            secretKeyRef:
              name: migration-tool-secrets
              key: MONGODB_PASSWORD
        volumeMounts:
        - name: mongodb-storage
          mountPath: /data/db
        resources:
          requests:
            memory: "2Gi"
            cpu: "1000m"
          limits:
            memory: "4Gi"
            cpu: "2000m"
  volumeClaimTemplates:
  - metadata:
      name: mongodb-storage
    spec:
      accessModes: ["ReadWriteOnce"]
      resources:
        requests:
          storage: 50Gi

---
# MongoDB Service
apiVersion: v1
kind: Service
metadata:
  name: mongodb-service
  namespace: migration-tool
spec:
  selector:
    app: mongodb
  ports:
  - port: 27017
    targetPort: 27017
  clusterIP: None

---
# Redis Deployment
apiVersion: apps/v1
kind: Deployment
metadata:
  name: redis
  namespace: migration-tool
spec:
  replicas: 1
  selector:
    matchLabels:
      app: redis
  template:
    metadata:
      labels:
        app: redis
    spec:
      containers:
      - name: redis
        image: redis:7-alpine
        ports:
        - containerPort: 6379
          name: redis
        resources:
          requests:
            memory: "512Mi"
            cpu: "250m"
          limits:
            memory: "1Gi"
            cpu: "500m"

---
# Redis Service
apiVersion: v1
kind: Service
metadata:
  name: redis-service
  namespace: migration-tool
spec:
  selector:
    app: redis
  ports:
  - port: 6379
    targetPort: 6379

---
# API Gateway Deployment
apiVersion: apps/v1
kind: Deployment
metadata:
  name: api-gateway
  namespace: migration-tool
spec:
  replicas: 3
  selector:
    matchLabels:
      app: api-gateway
  template:
    metadata:
      labels:
        app: api-gateway
    spec:
      containers:
      - name: api-gateway
        image: migration-tool/api-gateway:latest
        ports:
        - containerPort: 3000
          name: http
        env:
        - name: NODE_ENV
          valueFrom:
            configMapKeyRef:
              name: migration-tool-config
              key: NODE_ENV
        - name: PORT
          valueFrom:
            configMapKeyRef:
              name: migration-tool-config
              key: API_PORT
        envFrom:
        - configMapRef:
            name: migration-tool-config
        - secretRef:
            name: migration-tool-secrets
        livenessProbe:
          httpGet:
            path: /health
            port: 3000
          initialDelaySeconds: 30
          periodSeconds: 10
        readinessProbe:
          httpGet:
            path: /ready
            port: 3000
          initialDelaySeconds: 10
          periodSeconds: 5
        resources:
          requests:
            memory: "512Mi"
            cpu: "250m"
          limits:
            memory: "1Gi"
            cpu: "500m"

---
# API Gateway Service
apiVersion: v1
kind: Service
metadata:
  name: api-gateway-service
  namespace: migration-tool
spec:
  selector:
    app: api-gateway
  ports:
  - port: 80
    targetPort: 3000
  type: LoadBalancer

---
# Discovery Service Deployment
apiVersion: apps/v1
kind: Deployment
metadata:
  name: discovery-service
  namespace: migration-tool
spec:
  replicas: 2
  selector:
    matchLabels:
      app: discovery-service
  template:
    metadata:
      labels:
        app: discovery-service
    spec:
      containers:
      - name: discovery-service
        image: migration-tool/discovery-service:latest
        ports:
        - containerPort: 3001
        envFrom:
        - configMapRef:
            name: migration-tool-config
        - secretRef:
            name: migration-tool-secrets
        resources:
          requests:
            memory: "512Mi"
            cpu: "250m"
          limits:
            memory: "1Gi"
            cpu: "500m"

---
# Discovery Service
apiVersion: v1
kind: Service
metadata:
  name: discovery-service
  namespace: migration-tool
spec:
  selector:
    app: discovery-service
  ports:
  - port: 3001
    targetPort: 3001

---
# Mapping Engine Deployment
apiVersion: apps/v1
kind: Deployment
metadata:
  name: mapping-engine
  namespace: migration-tool
spec:
  replicas: 3
  selector:
    matchLabels:
      app: mapping-engine
  template:
    metadata:
      labels:
        app: mapping-engine
    spec:
      containers:
      - name: mapping-engine
        image: migration-tool/mapping-engine:latest
        ports:
        - containerPort: 3002
        envFrom:
        - configMapRef:
            name: migration-tool-config
        - secretRef:
            name: migration-tool-secrets
        resources:
          requests:
            memory: "1Gi"
            cpu: "500m"
          limits:
            memory: "2Gi"
            cpu: "1000m"

---
# Mapping Engine Service
apiVersion: v1
kind: Service
metadata:
  name: mapping-engine-service
  namespace: migration-tool
spec:
  selector:
    app: mapping-engine
  ports:
  - port: 3002
    targetPort: 3002

---
# Migration Planner Deployment
apiVersion: apps/v1
kind: Deployment
metadata:
  name: migration-planner
  namespace: migration-tool
spec:
  replicas: 2
  selector:
    matchLabels:
      app: migration-planner
  template:
    metadata:
      labels:
        app: migration-planner
    spec:
      containers:
      - name: migration-planner
        image: migration-tool/migration-planner:latest
        ports:
        - containerPort: 3003
        envFrom:
        - configMapRef:
            name: migration-tool-config
        - secretRef:
            name: migration-tool-secrets
        resources:
          requests:
            memory: "1Gi"
            cpu: "500m"
          limits:
            memory: "2Gi"
            cpu: "1000m"

---
# Migration Planner Service
apiVersion: v1
kind: Service
metadata:
  name: migration-planner-service
  namespace: migration-tool
spec:
  selector:
    app: migration-planner
  ports:
  - port: 3003
    targetPort: 3003

---
# Reporting Service Deployment
apiVersion: apps/v1
kind: Deployment
metadata:
  name: reporting-service
  namespace: migration-tool
spec:
  replicas: 2
  selector:
    matchLabels:
      app: reporting-service
  template:
    metadata:
      labels:
        app: reporting-service
    spec:
      containers:
      - name: reporting-service
        image: migration-tool/reporting-service:latest
        ports:
        - containerPort: 3004
        envFrom:
        - configMapRef:
            name: migration-tool-config
        - secretRef:
            name: migration-tool-secrets
        resources:
          requests:
            memory: "1Gi"
            cpu: "500m"
          limits:
            memory: "2Gi"
            cpu: "1000m"

---
# Reporting Service
apiVersion: v1
kind: Service
metadata:
  name: reporting-service
  namespace: migration-tool
spec:
  selector:
    app: reporting-service
  ports:
  - port: 3004
    targetPort: 3004

---
# Frontend Deployment
apiVersion: apps/v1
kind: Deployment
metadata:
  name: frontend
  namespace: migration-tool
spec:
  replicas: 3
  selector:
    matchLabels:
      app: frontend
  template:
    metadata:
      labels:
        app: frontend
    spec:
      containers:
      - name: frontend
        image: migration-tool/frontend:latest
        ports:
        - containerPort: 80
          name: http
        resources:
          requests:
            memory: "256Mi"
            cpu: "100m"
          limits:
            memory: "512Mi"
            cpu: "250m"

---
# Frontend Service
apiVersion: v1
kind: Service
metadata:
  name: frontend-service
  namespace: migration-tool
spec:
  selector:
    app: frontend
  ports:
  - port: 80
    targetPort: 80
  type: LoadBalancer

---
# Horizontal Pod Autoscaler for API Gateway
apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: api-gateway-hpa
  namespace: migration-tool
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: api-gateway
  minReplicas: 3
  maxReplicas: 10
  metrics:
  - type: Resource
    resource:
      name: cpu
      target:
        type: Utilization
        averageUtilization: 70
  - type: Resource
    resource:
      name: memory
      target:
        type: Utilization
        averageUtilization: 80

---
# Horizontal Pod Autoscaler for Mapping Engine
apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: mapping-engine-hpa
  namespace: migration-tool
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: mapping-engine
  minReplicas: 3
  maxReplicas: 10
  metrics:
  - type: Resource
    resource:
      name: cpu
      target:
        type: Utilization
        averageUtilization: 70

---
# Ingress Configuration
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: migration-tool-ingress
  namespace: migration-tool
  annotations:
    kubernetes.io/ingress.class: nginx
    cert-manager.io/cluster-issuer: letsencrypt-prod
    nginx.ingress.kubernetes.io/ssl-redirect: "true"
spec:
  tls:
  - hosts:
    - migration-tool.example.com
    secretName: migration-tool-tls
  rules:
  - host: migration-tool.example.com
    http:
      paths:
      - path: /api
        pathType: Prefix
        backend:
          service:
            name: api-gateway-service
            port:
              number: 80
      - path: /
        pathType: Prefix
        backend:
          service:
            name: frontend-service
            port:
              number: 80

---
# Network Policy
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: migration-tool-network-policy
  namespace: migration-tool
spec:
  podSelector: {}
  policyTypes:
  - Ingress
  - Egress
  ingress:
  - from:
    - namespaceSelector:
        matchLabels:
          name: migration-tool
  egress:
  - to:
    - namespaceSelector:
        matchLabels:
          name: migration-tool
  - to:
    - namespaceSelector: {}
    ports:
    - protocol: TCP
      port: 53
    - protocol: UDP
      port: 53

